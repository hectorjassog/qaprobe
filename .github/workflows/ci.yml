name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install qaprobe and Playwright
        run: |
          pip install -e .
          python -m playwright install --with-deps chromium

      - name: Self-test — replay critical path against example.com
        run: qaprobe replay examples/example_com_critical_path.yml --json-output
